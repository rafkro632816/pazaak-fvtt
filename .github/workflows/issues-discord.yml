on:
  issues:
    types: [opened, closed, reopened]

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Send issue notification to Discord
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          TITLE="${{ github.event.issue.title }}"
          AUTHOR="${{ github.event.issue.user.login }}"
          URL="${{ github.event.issue.html_url }}"
          NUMBER="${{ github.event.issue.number }}"
          ACTION="${{ github.event.action }}"
          DESCRIPTION="${{ github.event.issue.body }}"

          case "$ACTION" in
            opened)   LABEL="New issue" ; COLOR=1441536 ;;
            closed)   LABEL="Issue closed" ; COLOR=16711680 ;;
            reopened) LABEL="Issue reopened" ; COLOR=16744272 ;;
          esac

          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"<@&1504461859997351946>\",
              \"allowed_mentions\": { \"roles\": [\"1504461859997351946\"] },
              \"embeds\": [{
                \"title\": \"#$NUMBER — $TITLE\",
                \"url\": \"$URL\",
                \"color\": $COLOR,
                \"fields\": [
                  { \"name\": \"Author\", \"value\": \"$AUTHOR\", \"inline\": true },
                  { \"name\": \"Status\", \"value\": \"$LABEL\", \"inline\": true },
                  { \"name\": \"Description\", \"value\": \"$DESCRIPTION\", \"inline\": true}
                ],
                \"footer\": { \"text\": \"Pazaak — issue tracker\" }
              }]
            }"
