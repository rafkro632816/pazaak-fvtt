on:
  push:
    branches:
      - main
      - master

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Send commit notification to Discord
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL_MERGE_PR }}
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          AUTHOR="${{ github.event.head_commit.author.name }}"
          BRANCH="${{ github.ref_name }}"
          URL="${{ github.event.head_commit.url }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"<@&1504851311235960914> <@&1504461859997351946>\",
              \"allowed_mentions\": { \"roles\": [\"1504851311235960914\", \"1504461859997351946\"] },
              \"embeds\": [{
                \"title\": \"[\`$SHORT_SHA\`] $COMMIT_MSG\",
                \"url\": \"$URL\",
                \"color\": 1441536,
                \"fields\": [
                  { \"name\": \"Autor\", \"value\": \"$AUTHOR\", \"inline\": true },
                  { \"name\": \"Branch\", \"value\": \"\`$BRANCH\`\", \"inline\": true }
                ],
                \"footer\": { \"text\": \"Pazaak — nowy commit\" }
              }]
            }"
