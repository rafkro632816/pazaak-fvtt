on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Replace placeholders in module.json
        run: |
          sed -i \
            -e "s|#{VERSION}#|${{ env.VERSION }}|g" \
            -e "s|#{URL}#|https://github.com/${{ github.repository }}|g" \
            -e "s|#{MANIFEST}#|https://github.com/${{ github.repository }}/releases/latest/download/module.json|g" \
            -e "s|#{DOWNLOAD}#|https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/module.zip|g" \
            module.json

      - name: Create zip
        run: |
          zip -r module.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "*.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Pazaak ${{ github.ref_name }}"
          files: |
            module.zip
            module.json
